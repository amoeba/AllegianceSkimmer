name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore AllegianceSkimmer.sln

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build (Debug)
        run: msbuild AllegianceSkimmer.sln /p:Configuration=Debug /p:Platform="Any CPU"

      - name: Test
        run: dotnet test AllegianceSkimmer.Tests/AllegianceSkimmer.Tests.csproj --no-build -c Debug

      - name: Build (Release)
        run: msbuild AllegianceSkimmer/AllegianceSkimmer.csproj /p:Configuration=Release /p:Platform="Any CPU" /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Create release
        run: gh release create ${{ github.ref_name }} bin/net48/AllegianceSkimmerInstaller-*.exe --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
